<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Med-Care </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --light: #f8fafc;
            --dark: #0f172a;
            --gray: #64748b;
            --light-gray: #e2e8f0;
            --border: #cbd5e1;
        }

        body {
            background-color: #000305;
            color: #334155;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

       
        header {
            background: linear-gradient(135deg, var(--primary), #1105f3);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo i {
            font-size: 2.5rem;
            color: white;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .logo span {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: white;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        
        .main-content {
            display: flex;
            margin-top: 20px;
            gap: 20px;
            min-height: calc(100vh - 150px);
        }

       
        .sidebar {
            width: 280px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 20px 0;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .menu-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            color: var(--dark);
            text-decoration: none;
        }

        .menu-item:hover {
            background-color: #f1f5f9;
            border-left-color: var(--primary);
        }

        .menu-item.active {
            background-color: #eff6ff;
            border-left-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }

        .menu-item i {
            width: 24px;
            text-align: center;
            font-size: 1.1rem;
        }

       
        .dashboard-content {
            flex: 1;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--light-gray);
        }

        .section-title {
            font-size: 1.8rem;
            color: var(--dark);
            font-weight: 700;
        }

       
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .stat-icon {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .icon-patients {
            background-color: rgba(37, 99, 235, 0.1);
            color: var(--primary);
        }

        .icon-doctors {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--secondary);
        }

        .icon-appointments {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .icon-pharmacy {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .stat-info h3 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .stat-info p {
            color: var(--gray);
            font-size: 0.95rem;
        }

        
        .table-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid var(--light-gray);
            overflow-x: auto;
        }

        .table-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        thead {
            background-color: #f8fafc;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
            border-bottom: 2px solid var(--light-gray);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--light-gray);
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .status {
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--secondary);
        }

        .status-pending {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .status-completed {
            background-color: rgba(37, 99, 235, 0.1);
            color: var(--primary);
        }

        .status-inactive {
            background-color: rgba(100, 116, 139, 0.1);
            color: var(--gray);
        }

       
        .form-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--light-gray);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }

        .required:after {
            content: " *";
            color: var(--danger);
        }

        input, select, textarea {
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.3s;
            background-color: white;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

       
        .btn {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: var(--dark);
        }

        .btn-secondary:hover {
            background-color: #cbd5e1;
            transform: translateY(-2px);
        }

        .btn-success {
            background-color: var(--secondary);
            color: white;
        }

        .btn-success:hover {
            background-color: #0da271;
            transform: translateY(-2px);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #dc2626;
            transform: translateY(-2px);
        }

        .btn-warning {
            background-color: var(--warning);
            color: white;
        }

        .btn-warning:hover {
            background-color: #d97706;
            transform: translateY(-2px);
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 0.9rem;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            background-color: #000408;
        }

       
        .auth-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0530f0 0%, #764ba2 100%);
            padding: 20px;
        }

        .auth-box {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 450px;
            padding: 40px;
            animation: slideUp 0.5s;
        }

        .auth-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: var(--dark);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--light-gray);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            font-weight: 600;
            cursor: pointer;
            color: var(--gray);
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .auth-tab:hover {
            color: var(--primary);
        }

        .auth-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.5s;
        }

      
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--secondary);
            border-left: 4px solid var(--secondary);
        }

        .alert-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }

        .alert-info {
            background-color: rgba(37, 99, 235, 0.1);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

       
        .search-filter {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }

        .search-box input {
            width: 100%;
            padding-left: 45px;
        }

        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .page-btn:hover {
            background-color: #00050a;
        }

        .page-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        
        @media (max-width: 1024px) {
            .main-content {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                position: static;
            }
            
            .sidebar-menu {
                display: flex;
                overflow-x: auto;
                padding: 10px;
            }
            
            .menu-item {
                white-space: nowrap;
                border-left: none;
                border-bottom: 4px solid transparent;
                padding: 10px 20px;
            }
            
            .menu-item.active {
                border-left: none;
                border-bottom-color: var(--primary);
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .search-box {
                min-width: 100%;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
   
    <div id="authPage" class="auth-container">
        <div class="auth-box">
            <h1 class="auth-title"><i class="fas fa-hospital"></i> Med-Care Hospital</h1>
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchAuthTab('login')">Login</div>
                <div class="auth-tab" onclick="switchAuthTab('register')">Register</div>
            </div>
            
            <div id="loginForm" class="auth-form active">
                <div id="loginAlert" class="alert" style="display: none;"></div>
                <div class="form-group">
                    <label for="loginEmail" class="required">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="loginPassword" class="required">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <div class="form-group">
                    <label for="userType" class="required">Login as</label>
                    <select id="userType">
                        <option value="admin">Admin</option>
                        <option value="doctor">Doctor</option>
                        <option value="patient">Patient</option>
                        <option value="pharmacist">Pharmacist</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="login()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <div style="text-align: center; margin-top: 15px; color: var(--gray);">
                    Demo: Use any email/password
                </div>
            </div>
            
            <div id="registerForm" class="auth-form">
                <div id="registerAlert" class="alert" style="display: none;"></div>
                <div class="form-group">
                    <label for="registerName" class="required">Full Name</label>
                    <input type="string" id="registerName" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="registerEmail" class="required">Email Address</label>
                    <input type="email" id="registerEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="registerPassword" class="required">Password</label>
                    <input type="password" id="registerPassword" placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword" class="required">Confirm Password</label>
                    <input type="password" id="registerConfirmPassword" placeholder="Confirm your password">
                </div>
                <div class="form-group">
                    <label for="registerUserType" class="required">Register as</label>
                    <select id="registerUserType">
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                    </select>
                </div>
                <div class="form-group" id="doctorFields" style="display: none;">
                    <label for="specialization">Specialization</label>
                    <input type="text" id="specialization" placeholder="Enter specialization">
                </div>
                <button class="btn btn-success" style="width: 100%; margin-top: 20px;" onclick="register()">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </div>
        </div>
    </div>

    
    <div id="mainDashboard" style="display: none;">
        <header>
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-hospital"></i>
                    <div>
                        <h1>MediCare Hospital</h1>
                        <span>Complete Management System</span>
                    </div>
                </div>
                <div class="user-info">
                    <div id="currentModuleName" style="font-weight: 600; color: white;"></div>
                    <div class="user-avatar" id="userAvatar">AD</div>
                    <button class="btn btn-warning btn-small" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="main-content">
               
                <nav class="sidebar">
                    <ul class="sidebar-menu">
                        <li class="menu-item active" onclick="loadModule('dashboard')">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </li>
                        <li class="menu-item" onclick="loadModule('patients')">
                            <i class="fas fa-user-injured"></i>
                            <span>Patients</span>
                        </li>
                        <li class="menu-item" onclick="loadModule('doctors')">
                            <i class="fas fa-user-md"></i>
                            <span>Doctors</span>
                        </li>
                        <li class="menu-item" onclick="loadModule('appointments')">
                            <i class="fas fa-calendar-check"></i>
                            <span>Appointments</span>
                        </li>
                        <li class="menu-item" onclick="loadModule('pharmacy')">
                            <i class="fas fa-pills"></i>
                            <span>Pharmacy</span>
                        </li>
                        <li class="menu-item" onclick="loadModule('drugPurchase')">
                            <i class="fas fa-shopping-cart"></i>
                            <span>Drug Purchase</span>
                        </li>
                        <li class="menu-item" onclick="loadModule('admin')">
                            <i class="fas fa-cogs"></i>
                            <span>Admin Panel</span>
                        </li>
                        <li class="menu-item" onclick="loadModule('reports')">
                            <i class="fas fa-chart-bar"></i>
                            <span>Reports</span>
                        </li>
                    </ul>
                </nav>

               
                <div class="dashboard-content" id="moduleContent">
                   
                </div>
            </div>
        </div>
    </div>

   
    <div id="recordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add Record</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalFormContent">
                
            </div>
        </div>
    </div>

    <script>
       
        let currentUser = null;
        let currentModule = 'dashboard';
        let editingId = null;
        
       
        let patients = JSON.parse(localStorage.getItem('patients')) || [

            { id: 3, name: "Robert Brown", age: 58, gender: "Male", contact: "555-8765", email: "robert@example.com", address: "789 Pine Rd", status: "Inactive", registered: "2024-01-05" },
            { id: 4, name: "Sophia Williams", age: 28, gender: "Female", contact: "555-4321", email: "sophia@example.com", address: "321 Elm St", status: "Active", registered: "2024-01-15" }
        ];

        let doctors = JSON.parse(localStorage.getItem('doctors')) || [
            { id: 1, name: "Dr. Michael Chen", specialization: "Cardiology", contact: "555-1111", email: "mchen@hospital.com", department: "Cardiology", status: "Available", experience: "15 years" },
            { id: 2, name: "Dr. Sarah Miller", specialization: "Neurology", contact: "555-2222", email: "smiller@hospital.com", department: "Neurology", status: "Available", experience: "12 years" },
            { id: 3, name: "Dr. James Wilson", specialization: "Orthopedics", contact: "555-3333", email: "jwilson@hospital.com", department: "Orthopedics", status: "On Leave", experience: "20 years" },
            { id: 4, name: "Dr. Lisa Taylor", specialization: "Pediatrics", contact: "555-4444", email: "ltaylor@hospital.com", department: "Pediatrics", status: "Available", experience: "8 years" }
        ];

        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));

            if (tab === 'login') {

        function showAlert(elementId, message, type) {
            const alertDiv = document.getElementById(elementId);
            alertDiv.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'flex';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }

        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const userType = document.getElementById('userType').value;
            
            if (!email || !password) {
                showAlert('loginAlert', 'Please enter email and password', 'error');
                return;
            }
            
           
            const user = users.find(u => u.email === email && u.type === userType);
            
            if (user) {
               
                if (user.password === password || password.length > 0) { 
                    currentUser = user;
                    
                   
                    document.getElementById('userAvatar').textContent = user.avatar;
                    document.getElementById('authPage').style.display = 'none';
                    document.getElementById('mainDashboard').style.display = 'block';
                    
                   
                    loadModule('dashboard');
                    showAlert('loginAlert', `Welcome, ${user.name}!`, 'success');
                } else {
                    showAlert('loginAlert', 'Invalid password', 'error');
                }
            } else {
               
                currentUser = {
                    id: users.length + 1,
                    name: email.split('@')[0],
                    email: email,
                    type: userType,
                    avatar: userType.charAt(0).toUpperCase()
                };
                
                
                document.getElementById('userAvatar').textContent = currentUser.avatar;
                document.getElementById('authPage').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                
              
                loadModule('dashboard');
                showAlert('loginAlert', `Welcome, ${currentUser.name}!`, 'success');
            }
        }

        function register() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const userType = document.getElementById('registerUserType').value;
            const specialization = document.getElementById('specialization')?.value || '';
            
            if (!name || !email || !password || !confirmPassword) {
                showAlert('registerAlert', 'Please fill all required fields', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlert('registerAlert', 'Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('registerAlert', 'Password must be at least 6 characters', 'error');
                return;
            }
            
           
            if (users.some(u => u.email === email)) {
                showAlert('registerAlert', 'Email already registered', 'error');
                return;
            }
            
            
            const newUser = {
                id: users.length + 1,
                name: name,
                email: email,
                password: password,
                type: userType,
                avatar: name.charAt(0).toUpperCase(),
                specialization: userType === 'doctor' ? specialization : null
            };
            
            users.push(newUser);
            saveDataToStorage();
            
           
            if (userType === 'doctor') {
                const newDoctor = {
                    id: doctors.length + 1,
                    name: `Dr. ${name}`,
                    specialization: specialization,
                    contact: "",
                    email: email,
                    department: specialization,
                    status: "Available",
                    experience: "New"
                };
                doctors.push(newDoctor);
                saveDataToStorage();
            }
            
           
            if (userType === 'patient') {
                const newPatient = {
                    id: patients.length + 1,
                    name: name,
                    age: 0,
                    gender: "",
                    contact: "",
                    email: email,
                    address: "",
                    status: "Active",
                    registered: new Date().toISOString().split('T')[0]
                };
                patients.push(newPatient);
                saveDataToStorage();
            }
            
            showAlert('registerAlert', 'Registration successful! Please login.', 'success');
            
            
            setTimeout(() => {
                document.getElementById('registerName').value = '';
                document.getElementById('registerEmail').value = '';
                document.getElementById('registerPassword').value = '';
                document.getElementById('registerConfirmPassword').value = '';
                if (document.getElementById('specialization')) {
                    document.getElementById('specialization').value = '';
                }
                switchAuthTab('login');
                document.getElementById('registerAlert').style.display = 'none';
            }, 2000);
        }

        function logout() {

        function loadModule(moduleName) {
            currentModule = moduleName;
            
            
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            
            
            const menuItems = document.querySelectorAll('.menu-item');
            for (let item of menuItems) {
                if (item.textContent.includes(getModuleDisplayName(moduleName))) {
                    item.classList.add('active');
                    break;
                }
            }
            
            
            document.getElementById('currentModuleName').textContent = getModuleDisplayName(moduleName);
            
           
            let content = '';
            
            switch(moduleName) {
                case 'dashboard':
                    content = loadDashboard();
                    break;
                case 'patients':
                    content = loadPatients();
                    break;
                case 'doctors':
                    content = loadDoctors();
                    break;
                case 'appointments':
                    content = loadAppointments();
                    break;
                case 'pharmacy':
                    content = loadPharmacy();
                    break;
                case 'drugPurchase':
                    content = loadDrugPurchase();
                    break;
                case 'admin':
                    content = loadAdmin();
                    break;
                case 'reports':
                    content = loadReports();
                    break;
            }
            
            document.getElementById('moduleContent').innerHTML = content;
            
           
            if (moduleName === 'patients' || moduleName === 'doctors' || moduleName === 'appointments' || 
                moduleName === 'pharmacy' || moduleName === 'drugPurchase') {
                initializeSearch();
            }
        }

        function getModuleDisplayName(moduleName) {
            const names = {
                dashboard: 'Dashboard',
                patients: 'Patient Management',
                doctors: 'Doctor Management',
                appointments: 'Appointments',
                pharmacy: 'Pharmacy',
                drugPurchase: 'Drug Purchases',
                admin: 'Admin Panel',
                reports: 'Reports'
            };
            return names[moduleName] || moduleName;
        }

        function getStatusClass(status) {
            if (status === 'Active' || status === 'Available' || status === 'Confirmed' || status === 'Received') {
                return 'status-active';
            } else if (status === 'Pending') {
                return 'status-pending';
            } else if (status === 'Completed') {
                return 'status-completed';
            } else {
                return 'status-inactive';
            }
        }

            if (action === 'edit' && id) {
                switch(type) {
                    case 'patient':
                        record = patients.find(p => p.id === id);
                        break;
                    case 'doctor':
                        record = doctors.find(d => d.id === id);
                        break;

                        record = appointments.find(a => a.id === id);

                                <label class="required">Appointment Type</label>
                                <select id="appointmentType">
                                    <option value="Consultation" ${record && record.type === 'Consultation' ? 'selected' : ''}>Consultation</option>
                                    <option value="Follow-up" ${record && record.type === 'Follow-up' ? 'selected' : ''}>Follow-up</option>
                                    <option value="Emergency" ${record && record.type === 'Emergency' ? 'selected' : ''}>Emergency</option>
                                    <option value="Surgery" ${record && record.type === 'Surgery' ? 'selected' : ''}>Surgery</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="required">Status</label>
                                <select id="appointmentStatus">
                                    <option value="Pending" ${record && record.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                    <option value="Confirmed" ${record && record.status === 'Confirmed' ? 'selected' : ''}>Confirmed</option>
                                    <option value="Cancelled" ${record && record.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                                    <option value="Completed" ${record && record.status === 'Completed' ? 'selected' : ''}>Completed</option>
                                </select>
                            </div>
                            <div class="form-group" style="grid-column: span 2;">
                                <label>Notes</label>
                                <textarea id="appointmentNotes" placeholder="Enter any notes">${record ? record.notes : ''}</textarea>
                            </div>
                        </div>
                        <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 25px;">
                            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button class="btn btn-primary" onclick="saveAppointment()">${action === 'add' ? 'Schedule Appointment' : 'Update Appointment'}</button>
                        </div>
                    `;
                    break;
                    
                case 'drug':
                    formHTML = `
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="required">Drug Name</label>
                                <input type="text" id="drugName" value="${record ? record.name : ''}" placeholder="Enter drug name">
                            </div>
                            <div class="form-group">
                                <label class="required">Category</label>
                                <select id="drugCategory">
                                    <option value="">Select Category</option>
                                    <option value="Analgesic" ${record && record.category === 'Analgesic' ? 'selected' : ''}>Analgesic</option>
                                    <option value="Antibiotic" ${record && record.category === 'Antibiotic' ? 'selected' : ''}>Antibiotic</option>
                                    <option value="Hypertension" ${record && record.category === 'Hypertension' ? 'selected' : ''}>Hypertension</option>
                                    <option value="Diabetes" ${record && record.category === 'Diabetes' ? 'selected' : ''}>Diabetes</option>
                                    <option value="Antidepressant" ${record && record.category === 'Antidepressant' ? 'selected' : ''}>Antidepressant</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="required">Stock Quantity</label>
                                <input type="number" id="drugStock" value="${record ? record.stock : ''}" placeholder="Enter current stock">
                            </div>
                            <div class="form-group">
                                <label class="required">Price ($)</label>
                                <input type="number" step="0.01" id="drugPrice" value="${record ? record.price : ''}" placeholder="Enter price per unit">
                            </div>
                            <div class="form-group">
                                <label class="required">Expiry Date</label>
                                <input type="date" id="drugExpiry" value="${record ? record.expiry : ''}">
                            </div>
                            <div class="form-group">
                                <label class="required">Supplier</label>
                                <input type="text" id="drugSupplier" value="${record ? record.supplier : ''}" placeholder="Enter supplier name">
                            </div>
                            <div class="form-group">
                                <label class="required">Reorder Level</label>
                                <input type="number" id="drugReorderLevel" value="${record ? record.reorderLevel : '50'}" placeholder="Enter reorder level">
                            </div>
                        </div>
                        <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 25px;">
                            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button class="btn btn-primary" onclick="saveDrug()">${action === 'add' ? 'Add Drug' : 'Update Drug'}</button>
                        </div>
                    `;
                    break;
                    
                case 'drugPurchase':
                  
                    const selectedDrugId = drugId || (record ? record.drugId : null);
                    const selectedDrug = selectedDrugId ? drugs.find(d => d.id == selectedDrugId) : null;
                    
                    formHTML = `
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="required">Drug</label>
                                <select id="purchaseDrug" onchange="updatePurchasePrice()">
                                    <option value="">Select Drug</option>
                                    ${drugs.map(d => `
                                        <option value="${d.id}" data-price="${d.price}" ${selectedDrugId == d.id ? 'selected' : ''}>${d.name} (Stock: ${d.stock}, Price: $${d.price})</option>
                                    `).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="required">Quantity</label>
                                <input type="number" id="purchaseQuantity" value="${record ? record.quantity : '1'}" oninput="updatePurchaseTotal()" placeholder="Enter quantity">
                            </div>
                            <div class="form-group">
                                <label class="required">Unit Price ($)</label>
                                <input type="number" step="0.01" id="purchaseUnitPrice" value="${record ? record.unitPrice : (selectedDrug ? selectedDrug.price : '')}" oninput="updatePurchaseTotal()" placeholder="Enter unit price">
                            </div>
                            <div class="form-group">
                                <label>Total Amount ($)</label>
                                <input type="text" id="purchaseTotal" value="${record ? record.total.toFixed(2) : (selectedDrug ? selectedDrug.price : '0.00')}" readonly style="background-color: #f8fafc; font-weight: bold;">
                            </div>
                            <div class="form-group">
                                <label class="required">Supplier</label>
                                <input type="text" id="purchaseSupplier" value="${record ? record.supplier : ''}" placeholder="Enter supplier name">
                            </div>
                            <div class="form-group">
                                <label class="required">Purchase Date</label>
                                <input type="date" id="purchaseDate" value="${record ? record.date : new Date().toISOString().split('T')[0]}">
                            </div>
                            <div class="form-group">
                                <label class="required">Status</label>
                                <select id="purchaseStatus">
                                    <option value="Pending" ${record && record.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                    <option value="Received" ${record && record.status === 'Received' ? 'selected' : ''}>Received</option>
                                    <option value="Cancelled" ${record && record.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                                </select>
                            </div>
                        </div>
                        <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 25px;">
                            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button class="btn btn-primary" onclick="saveDrugPurchase()">${action === 'add' ? 'Record Purchase' : 'Update Purchase'}</button>
                        </div>
                    `;
                    break;
            }
            
            formContent.innerHTML = formHTML;
            modal.style.display = 'flex';
            
           
            if (type === 'drugPurchase') {
                updatePurchaseTotal();
            }
        }

        function closeModal() {
            document.getElementById('recordModal').style.display = 'none';
            editingId = null;
        }

       
        function savePatient() {
            const name = document.getElementById('patientName').value;
            const age = document.getElementById('patientAge').value;
            const gender = document.getElementById('patientGender').value;
            const contact = document.getElementById('patientContact').value;
            const email = document.getElementById('patientEmail').value;
            const address = document.getElementById('patientAddress').value;
            const status = document.getElementById('patientStatus').value;
            
            if (!name || !age || !gender || !contact || !email || !status) {
                alert('Please fill all required fields');
                return;
            }
            
            if (editingId) {
               
                const index = patients.findIndex(p => p.id === editingId);
                if (index !== -1) {
                    patients[index] = {
                        ...patients[index],
                        name, age: parseInt(age), gender, contact, email, address, status
                    };
                }
            } else {
                
                const newPatient = {
                    id: patients.length > 0 ? Math.max(...patients.map(p => p.id)) + 1 : 1,
                    name,
                    age: parseInt(age),
                    gender,
                    contact,
                    email,
                    address,
                    status,
                    registered: new Date().toISOString().split('T')[0]
                };
                patients.push(newPatient);
            }
            
            saveDataToStorage();
            closeModal();
            loadModule('patients');
        }

        function saveDoctor() {
            const name = document.getElementById('doctorName').value;
            const specialization = document.getElementById('doctorSpecialization').value;
            const department = document.getElementById('doctorDepartment').value;
            const contact = document.getElementById('doctorContact').value;
            const email = document.getElementById('doctorEmail').value;
            const experience = document.getElementById('doctorExperience').value;
            const status = document.getElementById('doctorStatus').value;
            
            if (!name || !specialization || !department || !contact || !email || !status) {
                alert('Please fill all required fields');
                return;
            }
            
            if (editingId) {
               
                const index = doctors.findIndex(d => d.id === editingId);
                if (index !== -1) {
                    doctors[index] = {
                        ...doctors[index],
                        name, specialization, department, contact, email, experience, status
                    };
                }
            } else {
               
                const newDoctor = {
                    id: doctors.length > 0 ? Math.max(...doctors.map(d => d.id)) + 1 : 1,

                    specialization,
                    department,
                    contact,
                    email,
                    experience,
                    status
                };
                doctors.push(newDoctor);
            }
            
            saveDataToStorage();

        }

        function saveAppointment() {
            const patientId = parseInt(document.getElementById('appointmentPatient').value);
            const doctorId = parseInt(document.getElementById('appointmentDoctor').value);
            const date = document.getElementById('appointmentDate').value;
            const time = document.getElementById('appointmentTime').value;
            const type = document.getElementById('appointmentType').value;
            const status = document.getElementById('appointmentStatus').value;
            const notes = document.getElementById('appointmentNotes').value;
            
            if (!patientId || !doctorId || !date || !time || !type || !status) {
                alert('Please fill all required fields');
                return;
            }
            
            const patient = patients.find(p => p.id === patientId);
            const doctor = doctors.find(d => d.id === doctorId);
            
            if (!patient || !doctor) {
                alert('Invalid patient or doctor selected');
                return;
            }
            
            if (editingId) {
                
                const index = appointments.findIndex(a => a.id === editingId);
                if (index !== -1) {
                    appointments[index] = {
                        ...appointments[index],
                        patientId,
                        patient: patient.name,
                        doctorId,
                        doctor: doctor.name,
                        date,
                        time,
                        type,
                        status,
                        notes
                    };
                }
            } else {
                
                const newAppointment = {
                    id: appointments.length > 0 ? Math.max(...appointments.map(a => a.id)) + 1 : 1,
                    patientId,
                    patient: patient.name,
                    doctorId,
                    doctor: doctor.name,
                    date,
                    time,
                    type,
                    status,
                    notes
                };
                appointments.push(newAppointment);
            }
            
            saveDataToStorage();
            closeModal();
            loadModule('appointments');
        }

        function saveDrug() {
            const name = document.getElementById('drugName').value;
            const category = document.getElementById('drugCategory').value;
            const stock = parseInt(document.getElementById('drugStock').value);
            const price = parseFloat(document.getElementById('drugPrice').value);
            const expiry = document.getElementById('drugExpiry').value;
            const supplier = document.getElementById('drugSupplier').value;
            const reorderLevel = parseInt(document.getElementById('drugReorderLevel').value);
            
            if (!name || !category || isNaN(stock) || isNaN(price) || !expiry || !supplier || isNaN(reorderLevel)) {
                alert('Please fill all required fields with valid values');
                return;
            }
            
            if (editingId) {
               
                const index = drugs.findIndex(d => d.id === editingId);
                if (index !== -1) {
                    drugs[index] = {
                        ...drugs[index],
                        name, category, stock, price, expiry, supplier, reorderLevel
                    };
                }
            } else {
               
                const newDrug = {
                    id: drugs.length > 0 ? Math.max(...drugs.map(d => d.id)) + 1 : 1,
                    name,
                    category,
                    stock,
                    price,
                    expiry,
                    supplier,
                    reorderLevel
                };
                drugs.push(newDrug);
            }
            
            saveDataToStorage();
            closeModal();
            loadModule('pharmacy');
        }

        function updatePurchasePrice() {
            const drugSelect = document.getElementById('purchaseDrug');
            const selectedOption = drugSelect.options[drugSelect.selectedIndex];
            if (selectedOption && selectedOption.value) {
                const price = selectedOption.getAttribute('data-price');
                document.getElementById('purchaseUnitPrice').value = price;
                updatePurchaseTotal();
            }
        }

        function updatePurchaseTotal() {
            const quantity = document.getElementById('purchaseQuantity').value;
            const unitPrice = document.getElementById('purchaseUnitPrice').value;
            
            if (quantity && unitPrice) {
                const total = parseFloat(quantity) * parseFloat(unitPrice);
                document.getElementById('purchaseTotal').value = total.toFixed(2);
            } else {
                document.getElementById('purchaseTotal').value = '0.00';
            }
        }

        function saveDrugPurchase() {
            const drugId = parseInt(document.getElementById('purchaseDrug').value);
            const quantity = parseInt(document.getElementById('purchaseQuantity').value);
            const unitPrice = parseFloat(document.getElementById('purchaseUnitPrice').value);
            const supplier = document.getElementById('purchaseSupplier').value;
            const date = document.getElementById('purchaseDate').value;
            const status = document.getElementById('purchaseStatus').value;
            
            if (!drugId || isNaN(quantity) || isNaN(unitPrice) || !supplier || !date || !status) {
                alert('Please fill all required fields');
                return;
            }
            
            const drug = drugs.find(d => d.id === drugId);
            if (!drug) {
                alert('Selected drug not found');
                return;
            }
            
            const total = quantity * unitPrice;
            
            if (editingId) {
               
                const index = drugPurchases.findIndex(p => p.id === editingId);
                if (index !== -1) {
                    drugPurchases[index] = {
                        ...drugPurchases[index],
                        drugId,
                        drugName: drug.name,
                        quantity,
                        unitPrice,
                        total,
                        supplier,
                        date,
                        status
                    };
                    
                    
                    if (status === 'Received' && drugPurchases[index].status !== 'Received') {
                        drug.stock += quantity;
                    }
                }
            } else {
                
                const newPurchase = {
                    id: drugPurchases.length > 0 ? Math.max(...drugPurchases.map(p => p.id)) + 1 : 1,
                    drugId,
                    drugName: drug.name,
                    quantity,
                    unitPrice,
                    total,
                    supplier,
                    date,
                    status
                };
                drugPurchases.push(newPurchase);
                
               
                if (status === 'Received') {
                    drug.stock += quantity;
                }
            }
            
            saveDataToStorage();
            closeModal();
            loadModule('drugPurchase');
        }

        
        function deleteRecord(type, id) {
            if (!confirm(`Are you sure you want to delete this ${type}?`)) {
                return;
            }
            
            let arrayToUpdate;
            switch(type) {
                case 'patient':
                    arrayToUpdate = patients;
                    break;
                case 'doctor':
                    arrayToUpdate = doctors;
                    break;
                case 'appointment':
                    arrayToUpdate = appointments;
                    break;
                case 'drug':
                    arrayToUpdate = drugs;
                    break;
                case 'drugPurchase':
                    arrayToUpdate = drugPurchases;
                    break;
            }
            
            if (arrayToUpdate) {
                const index = arrayToUpdate.findIndex(item => item.id === id);
                if (index !== -1) {
                    arrayToUpdate.splice(index, 1);
                    saveDataToStorage();
                    loadModule(currentModule);
                }
            }
        }

        function deleteUser(id) {
            if (id === currentUser.id) {
                alert('You cannot delete your own account');
                return;
            }
            
            if (!confirm('Are you sure you want to delete this user?')) {
                return;
            }
            
            const index = users.findIndex(u => u.id === id);
            if (index !== -1) {
                users.splice(index, 1);
                saveDataToStorage();
                loadModule('admin');
            }
        }

        
        function initializeSearch() {
            
        }

        function searchTable(searchInputId, tableId) {
            const input = document.getElementById(searchInputId);
            const filter = input.value.toUpperCase();
            const table = document.getElementById(tableId);
            const tr = table.getElementsByTagName("tr");
            
            for (let i = 0; i < tr.length; i++) {
                const td = tr[i].getElementsByTagName("td");
                let showRow = false;
                
                for (let j = 0; j < td.length; j++) {
                    if (td[j]) {
                        const txtValue = td[j].textContent || td[j].innerText;
                        if (txtValue.toUpperCase().indexOf(filter) > -1) {
                            showRow = true;
                            break;
                        }
                    }
                }
                
                tr[i].style.display = showRow ? "" : "none";
            }
        }

        function filterTable(filterId, tableId, columnIndex) {
            const filter = document.getElementById(filterId).value;
            const table = document.getElementById(tableId);
            const tr = table.getElementsByTagName("tr");
            
            for (let i = 0; i < tr.length; i++) {
                const td = tr[i].getElementsByTagName("td")[columnIndex];
                if (td) {
                    const txtValue = td.textContent || td.innerText;
                    if (filter === "" || txtValue === filter) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }
            }
        }

        function updateAppointmentStatus(id, status) {
            const appointment = appointments.find(a => a.id === id);
            if (appointment) {
                appointment.status = status;
                saveDataToStorage();
                loadModule('appointments');
            }
        }

        function updatePurchaseStatus(id, status) {
            const purchase = drugPurchases.find(p => p.id === id);
            if (purchase) {
                purchase.status = status;
                
                
                if (status === 'Received') {
                    const drug = drugs.find(d => d.id === purchase.drugId);
                    if (drug) {
                        drug.stock += purchase.quantity;
                    }
                }
                
                saveDataToStorage();
                loadModule('drugPurchase');
            }
        }

        function exportData(type) {
            let data, filename;
            
            switch(type) {
                case 'patients':
                    data = patients;
                    filename = 'patients.csv';
                    break;
                case 'doctors':
                    data = doctors;
                    filename = 'doctors.csv';
                    break;
                case 'appointments':
                    data = appointments;
                    filename = 'appointments.csv';
                    break;
                case 'drugs':
                    data = drugs;
                    filename = 'drugs.csv';
                    break;
                case 'drugPurchases':
                    data = drugPurchases;
                    filename = 'drug_purchases.csv';
                    break;
            }
            
            if (data && data.length > 0) {
               
                const headers = Object.keys(data[0]);
                const csvRows = [
                    headers.join(','),
                    ...data.map(row => headers.map(header => JSON.stringify(row[header])).join(','))
                ];
                const csvString = csvRows.join('\n');
                
                
                const blob = new Blob([csvString], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                window.URL.revokeObjectURL(url);
            }
        }

            if (confirm('This will reset all demo data to default values. Are you sure?')) {
                localStorage.clear();
                
                
                window.location.reload();

            const modal = document.getElementById('recordModal');
